<div class="wrapper">
  <div class="book-event-card">
    <div class="info-wrapper">
      <p class="event-info">
        <span class="event-created-at">{{
          bookEvent().created_at | date
        }}</span>
        <span class="event-owner">{{ bookEvent().user_name }}</span>
      </p>

      <p class="location">
        <i class="pi pi-map-marker"></i> {{ bookEvent().location }}
      </p>
      <p-rating
        class="rating"
        [(ngModel)]="bookRating"
        readonly="true"
      ></p-rating>
      <p class="description">
        {{ bookEvent().description }}
      </p>
    </div>
    <div class="image-wrapper">
      <p-galleria
        circular="true"
        showThumbnails="false"
        showIndicators="true"
        [showIndicatorsOnItem]="true"
        [value]="this.images()"
      >
        <ng-template #item let-item>
          <img [src]="item.itemImageSrc" style="width: 100%" />
        </ng-template>
        <ng-template #thumbnail let-item>
          <img [src]="item.thumbnailImageSrc" />
        </ng-template>
      </p-galleria>
    </div>
  </div>
</div>
