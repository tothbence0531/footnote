<div class="wrapper">
  <div class="container">
    <div class="tree">
      <div class="parent-row">
        <app-book-card class="parent-card" [book]="this.book()"></app-book-card>
      </div>
      <div class="children">
        @for (event of this.book()?.events; track $index) {
          @if ($index !== 0) {
            <div class="child">
              <app-book-event-card
                [bookEvent]="event"
                class="child-card"
              ></app-book-event-card>
            </div>
          }
        }

        <i
          class="pi pi-plus add-event"
          (click)="this.dialogService.showBookEvent()"
        ></i>
      </div>
    </div>
  </div>
</div>

<app-book-event-form
  [visible]="this.dialogService.bookEventVisible()"
  (visibleChange)="this.dialogService.bookEventVisible.set($event)"
  (onSubmit)="this.submitBookEvent($event)"
></app-book-event-form>
